<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 深度風格實驗室</title>
    <!-- 引入 Bootstrap、Icons 與動畫 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" rel="stylesheet" />
    <link href="./indexcss.css" rel="stylesheet" />
</head>

<body>
    <div class="page-shell">
        <section class="hero">
            <h1 class="h2 mb-0">CSS 深度風格實驗室</h1>
            <p>沿用 HTML 教學頁的版面節奏，保留 CSS 實驗室的藍綠色系與流體感。左側挑主題，中間看拆解，右側直接改樣式並即時觀察效果。</p>
        </section>

        <div class="container-fluid px-0">
            <div class="row main-row g-4">

            <!-- 左側：自動選單 -->
            <div class="col-lg-3 h-100">
                <aside class="box d-flex flex-column">
                    <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mb-3">
                        <h2 class="h5 mb-0">主題索引</h2>
                        <span class="topic-counter" id="topic-counter">0 個主題</span>
                    </div>
                    <p class="sidebar-note">點選屬性開始改造 HTML，從左側挑主題後可立即在右側實驗。</p>
                    <div class="filter-box mb-3">
                        <span class="filter-icon"><i class="bi bi-search"></i></span>
                        <input id="topic-search" type="text" placeholder="搜尋 flex、動畫、陰影、定位..." aria-label="搜尋 CSS 主題">
                    </div>
                    <div id="tag-list" class="sidebar-scroll flex-grow-1" aria-label="CSS 主題清單">
                        <!-- JS 自動生成 -->
                    </div>
                </aside>
            </div>

            <!-- 中間：百科全書教學內容 -->
            <div class="col-lg-5 h-100">
                <div class="box" id="detail-area">
                    <div class="text-center py-5 mt-5">
                        <i class="bi bi-stars display-1 text-primary opacity-25"></i>
                        <h3 class="mt-4 fw-bold">選擇一個 CSS 主題</h3>
                        <p class="text-secondary">深入了解屬性背後的邏輯與美學</p>
                    </div>
                </div>
            </div>

            <!-- 右側：實時預覽與編輯 -->
            <div class="col-lg-4 h-100">
                <div class="row h-100 g-4">
                    <div class="col-12 h-50">
                        <div class="box">
                            <h5 class="fw-bold mb-3"><i class="bi bi-eye"></i> 即時預覽</h5>
                            <div id="preview-window" class="rounded-3 h-75">
                                <div id="target-element">Hello CSS</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 h-50">
                        <div class="box d-flex flex-column">
                            <h5 class="fw-bold mb-3"><i class="bi bi-terminal"></i> CSS 屬性編輯器</h5>
                            <textarea id="code-editor" class="form-control flex-grow-1" spellcheck="false" aria-label="CSS 屬性編輯器"></textarea>
                            <div class="mt-2 text-muted" style="font-size: 0.8rem;">
                                <i class="bi bi-magic"></i> 老師提示：右邊改完，左邊立即生效！
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            </div>
        </div>
    </div>

    <script src="./indexcss.js"></script>

</body>

</html>
