<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 常用標籤教學工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1768ac;
            --accent: #ffd166;
            --surface: #ffffff;
            --surface-soft: #f5f7fb;
            --border: #d6deeb;
            --text: #1f2a37;
            --muted: #5f6b7a;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #eef4fb 0%, #f8fafc 100%);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            padding: 24px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(28, 58, 92, 0.08);
            padding: 24px;
            height: 100%;
        }

        .hero {
            margin-bottom: 20px;
            padding: 24px 28px;
            border-radius: 28px;
            background: linear-gradient(135deg, #1768ac, #4ea5d9);
            color: #fff;
            box-shadow: 0 14px 32px rgba(23, 104, 172, 0.25);
        }

        .hero p {
            margin: 10px 0 0;
            max-width: 760px;
            color: rgba(255, 255, 255, 0.88);
        }

        .sidebar-scroll {
            max-height: calc(100vh - 270px);
            overflow-y: auto;
            padding-right: 6px;
        }

        .tag-group + .tag-group {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .tag-group-title {
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
        }

        .tag-list {
            display: grid;
            gap: 10px;
        }

        .tag-item {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: #fff;
            text-align: left;
            transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .tag-item:hover {
            border-color: var(--primary);
            background: #f3f8fd;
            transform: translateX(4px);
        }

        .tag-item.active {
            border-color: var(--primary);
            background: #e8f2fb;
        }

        .tag-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent);
            font-weight: 700;
            margin-right: 10px;
        }

        .tag-label {
            font-weight: 700;
        }

        .tag-note {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .detail-empty {
            display: grid;
            place-items: center;
            min-height: 100%;
            color: var(--muted);
            text-align: center;
        }

        .detail-block {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            height: 100%;
        }

        .pill {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: #dcecff;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .preview-area {
            min-height: 180px;
            border: 1px dashed #c5d2e2;
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff, #f8fbff);
            padding: 18px;
        }

        .editor {
            min-height: 220px;
            border: none;
            border-radius: 18px;
            background: #1e293b;
            color: #d4f1f9;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.5;
            padding: 18px;
            resize: none;
        }

        .editor:focus {
            box-shadow: none;
            background: #0f172a;
            color: #e2f3ff;
        }

        .info-list {
            margin: 0;
            padding-left: 18px;
        }

        .info-list li + li {
            margin-top: 8px;
        }

        code {
            color: #c0266d;
            font-weight: 700;
        }

        @media (max-width: 991px) {
            .sidebar-scroll {
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }
        }
    </style>
</head>

                        </div>

                </div>
                <div class="col-lg-4">

                            </div>
                            <textarea id="code-editor" class="form-control editor flex-grow-1" spellcheck="false"></textarea>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

        const tagsData = Object.fromEntries(tagGroups.flatMap((group) => group.items.map((tag) => [tag.key, tag])));
        const detailArea = document.getElementById('detail-content');
        const previewArea = document.getElementById('preview-area');
        const codeEditor = document.getElementById('code-editor');
        const tagList = document.getElementById('tag-list');
        const tagCount = document.getElementById('tag-count');

        function renderTagList() {
            tagList.innerHTML = tagGroups.map((group) => `
                <section class="tag-group">
                    <h3 class="tag-group-title">${group.title}</h3>
                    <div class="tag-list">
                        ${group.items.map((tag) => `
                            <button type="button" class="tag-item" data-tag="${tag.key}">
                                <span class="tag-key">${tag.key}</span>
                                <span class="tag-label">${tag.label}</span>
                                <span class="tag-note">${tag.short}</span>
                            </button>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        function setActiveTag(tagKey) {
            tagList.querySelectorAll('.tag-item').forEach((item) => {
                item.classList.toggle('active', item.dataset.tag === tagKey);
            });
        }

        function renderDetail(item) {
            detailArea.innerHTML = `
                <div>
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3 flex-wrap">
                        <div>
                            <div class="small text-primary fw-bold mb-2">${item.group}</div>
                            <h2 class="h3 mb-2">${item.title}</h2>
                            <p class="mb-0 text-muted">${item.concept}</p>
                        </div>
                        <span class="pill">${item.badge}</span>
                    </div>
                    <div class="detail-block mb-3">
                        <h3 class="h6">生活化理解</h3>
                        <p class="mb-0">${item.analogy}</p>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-12">
                            <div class="detail-block">
                                <h3 class="h6">核心語法拆解</h3>
                                <div class="table-responsive">
                                    <table class="table align-middle mb-0">
                                        <thead><tr><th>語法</th><th>作用</th></tr></thead>
                                        <tbody>${item.anatomy.map((part) => `<tr><td>${part.part}</td><td>${part.effect}</td></tr>`).join('')}</tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block">
                                <h3 class="h6">常見搭配</h3>
                                <ul class="info-list">${item.styles.map((style) => `<li><strong>${style.cls}</strong>：${style.desc}</li>`).join('')}</ul>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block">
                                <h3 class="h6">JS 互動提醒</h3>
                                <p class="mb-0">${item.jsLogic}</p>
                            </div>
                        </div>
                    </div>
                    <div class="detail-block">
                        <h3 class="h6">實作提醒</h3>
                        <p class="mb-0">${item.note}</p>
                    </div>
                </div>
            `;
        }

        function showDetail(tagKey) {
            const item = tagsData[tagKey];
            if (!item) return;
            renderDetail(item);
            codeEditor.value = item.code;
            previewArea.innerHTML = item.code;
            setActiveTag(tagKey);
        }

        document.addEventListener('DOMContentLoaded', () => {
            tagCount.textContent = `${Object.keys(tagsData).length} 個標籤`;
            renderTagList();
            tagList.addEventListener('click', (event) => {
                const target = event.target.closest('.tag-item');
                if (!target) return;
                showDetail(target.dataset.tag);
            });
            codeEditor.addEventListener('input', () => {
                previewArea.innerHTML = codeEditor.value;
            });
            showDetail('html');
        });
    </script>
