<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 教學整合工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1768ac;
            --accent: #ffd166;
            --surface: #ffffff;
            --surface-soft: #f5f7fb;
            --border: #d6deeb;
            --text: #1f2a37;
            --muted: #5f6b7a;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #eef4fb 0%, #f8fafc 100%);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            padding: 24px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(28, 58, 92, 0.08);
            padding: 24px;
            height: 100%;
        }

        .hero {
            margin-bottom: 20px;
            padding: 24px 28px;
            border-radius: 28px;
            background: linear-gradient(135deg, #1768ac, #4ea5d9);
            color: #fff;
            box-shadow: 0 14px 32px rgba(23, 104, 172, 0.25);
        }

        .hero p {
            margin: 10px 0 0;
            max-width: 720px;
            color: rgba(255, 255, 255, 0.88);
        }

        .tag-list {
            display: grid;
            gap: 10px;
        }

        .tag-item {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: #fff;
            text-align: left;
            transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .tag-item:hover {
            border-color: var(--primary);
            background: #f3f8fd;
            transform: translateX(4px);
        }

        .tag-item.active {
            border-color: var(--primary);
            background: #e8f2fb;
        }

        .tag-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent);
            font-weight: 700;
            margin-right: 10px;
        }

        .tag-label {
            font-weight: 700;
        }

        .tag-note {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .detail-empty {
            display: grid;
            place-items: center;
            min-height: 100%;
            color: var(--muted);
            text-align: center;
        }

        .detail-block {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            height: 100%;
        }

        .pill {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: #dcecff;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .preview-area {
            min-height: 180px;
            border: 1px dashed #c5d2e2;
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff, #f8fbff);
            padding: 18px;
        }

        .editor {
            min-height: 220px;
            border: none;
            border-radius: 18px;
            background: #1e293b;
            color: #d4f1f9;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.5;
            padding: 18px;
            resize: none;
        }

        .editor:focus {
            box-shadow: none;
            background: #0f172a;
            color: #e2f3ff;
        }

        .info-list {
            margin: 0;
            padding-left: 18px;
        }

        .info-list li + li {
            margin-top: 8px;
        }

        code {
            color: #c0266d;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <section class="hero">
            <h1 class="h2 mb-0">HTML 教學整合工具</h1>
            <p>結合 123 的深度解說與 indexhtml 的快速操作模式。左邊選標籤，中間看教學拆解，右邊直接編輯並預覽結果。</p>
        </section>

        <div class="container-fluid px-0">
            <div class="row g-4">
                <div class="col-lg-3">
                    <aside class="panel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">標籤索引</h2>
                            <span class="pill">9 個主題</span>
                        </div>
                        <div id="tag-list" class="tag-list"></div>
                    </aside>
                </div>

                <div class="col-lg-5">
                    <main class="panel h-100">
                        <div id="detail-content" class="detail-empty">
                            <div>
                                <h2 class="h4">請從左側選一個標籤</h2>
                                <p class="mb-0">這裡會顯示用途、常見樣式、JS 互動重點與實作提醒。</p>
                            </div>
                        </div>
                    </main>
                </div>

                <div class="col-lg-4">
                    <div class="d-grid gap-4 h-100">
                        <section class="panel">
                            <h2 class="h5 mb-3">效果展示</h2>
                            <div id="preview-area" class="preview-area"></div>
                        </section>

                        <section class="panel d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h2 class="h5 mb-0">程式碼範例</h2>
                                <span class="text-muted small">可直接編輯</span>
                            </div>
                            <textarea id="code-editor" class="form-control editor flex-grow-1" spellcheck="false"></textarea>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tagsData = {
            h1: { label: 'h1 ~ h6 標題', short: '頁面層級與重點結構', title: 'h1 ~ h6 標題標籤', badge: '結構核心', concept: '標題不只是把字放大，而是在描述頁面資訊的層級。搜尋引擎與閱讀器都會依靠這個結構理解內容。', analogy: '像一本書的章節架構，h1 是書名，h2 是章節，h3 是段落小標。', anatomy: [{ part: '<code>&lt;h1&gt;</code>', effect: '頁面最重要的主標題，通常一頁一個。' }, { part: '<code>&lt;h2&gt;</code>', effect: '用於區塊主題，承接 h1。' }], styles: [{ cls: 'text-primary', desc: '讓標題有明確視覺焦點。' }, { cls: 'display-5', desc: '放大標題字級，適合首頁主視覺。' }], jsLogic: '可透過 <code>textContent</code> 動態更新標題，例如登入後顯示使用者名稱。', note: '避免為了字大就濫用 h1；標題順序要符合層級。', code: '<h1 class="display-5 text-primary">前端學習地圖</h1>\n<h2 class="h5 text-muted">從結構到互動，一步一步建立觀念</h2>' },
            p: { label: 'p 段落', short: '承載說明文字與敘述', title: 'p 段落標籤', badge: '內容基礎', concept: '段落是網頁最常見的文字容器，適合放教學說明、文章內文與補充資訊。', analogy: '像你在白板上講課時，一段完整說明就對應一個段落。', anatomy: [{ part: '<code>&lt;p&gt;</code>', effect: '建立一個語意清楚的文字段落。' }, { part: '<code>class</code>', effect: '搭配 Bootstrap 可快速控制字色、間距與字重。' }], styles: [{ cls: 'lead', desc: '讓段落像前言一樣更醒目。' }, { cls: 'text-muted', desc: '降低文字對比，適合次要說明。' }], jsLogic: '常搭配 <code>innerText</code> 或 <code>innerHTML</code> 更新提示訊息。', note: '不要把多個主題硬塞進同一個 p；一段只說一件事。', code: '<p class="lead">HTML 定義內容結構，CSS 負責外觀，JavaScript 則讓頁面開始互動。</p>' },
            a: { label: 'a 超連結', short: '建立頁面與資源的連結', title: 'a 超連結標籤', badge: '導覽元件', concept: '超連結讓使用者在頁面之間移動，也能連到下載資源、外部網站或頁面錨點。', analogy: '像地圖上的指路牌，告訴使用者下一步去哪裡。', anatomy: [{ part: '<code>href</code>', effect: '決定點擊後導向的目標。' }, { part: '<code>target="_blank"</code>', effect: '在新分頁開啟外部網站。' }], styles: [{ cls: 'btn btn-link', desc: '把連結做成按鈕感，但仍保留導覽語意。' }, { cls: 'text-decoration-none', desc: '移除底線，讓介面更俐落。' }], jsLogic: '可監聽點擊事件做追蹤，但不應破壞原本導覽行為。', note: '連結文字要具體，例如「查看課程大綱」，不要只寫「這裡」。', code: '<a href="#" class="btn btn-link text-decoration-none">查看課程大綱</a>' },
            button: { label: 'button 按鈕', short: '觸發事件與互動流程', title: 'button 互動按鈕', badge: '互動核心', concept: '按鈕是執行操作的入口，例如送出、確認、刪除或展開面板。', analogy: '像機器上的操作鍵，按下去就要有清楚回應。', anatomy: [{ part: '<code>type="button"</code>', effect: '避免在表單中誤觸發送出。' }, { part: '<code>&lt;button&gt;文字&lt;/button&gt;</code>', effect: '按鈕文字要直接描述動作。' }], styles: [{ cls: 'btn-success', desc: '適合成功或確認動作。' }, { cls: 'rounded-pill', desc: '建立更柔和的膠囊造型。' }], jsLogic: '典型寫法是 <code>button.addEventListener("click", handler)</code>。', note: '危險操作要有明確警示，不要用含糊的按鈕文案。', code: '<button type="button" class="btn btn-success rounded-pill px-4">完成任務</button>' },
            input: { label: 'input 輸入框', short: '蒐集使用者輸入資料', title: 'input 輸入框', badge: '資料輸入', concept: '輸入框用於接收帳號、密碼、Email、搜尋關鍵字等內容。', analogy: '像表單上的空格，等著使用者填資料。', anatomy: [{ part: '<code>type="email"</code>', effect: '瀏覽器可協助檢查輸入格式。' }, { part: '<code>placeholder</code>', effect: '提供輸入提示，但不能取代標籤。' }], styles: [{ cls: 'form-control', desc: 'Bootstrap 的基本輸入框樣式。' }, { cls: 'form-control-lg', desc: '在手機上更容易點擊與閱讀。' }], jsLogic: '常監聽 <code>input</code> 事件，即時取得輸入值。', note: '務必搭配 <code>&lt;label&gt;</code>，提升可用性與無障礙。', code: '<label class="form-label">電子郵件</label>\n<input type="email" class="form-control" placeholder="name@example.com">' },
            select: { label: 'select 下拉選單', short: '從固定選項中挑選', title: 'select 下拉選單', badge: '選項控制', concept: '當選項固定而且需要節省畫面空間時，下拉選單會比一堆按鈕更合適。', analogy: '像櫃台上的號碼牌機，你只能從既有選項中選一個。', anatomy: [{ part: '<code>&lt;select&gt;</code>', effect: '外層容器，負責包住所有選項。' }, { part: '<code>&lt;option&gt;</code>', effect: '每一個可被選取的項目。' }], styles: [{ cls: 'form-select', desc: 'Bootstrap 下拉選單標準樣式。' }, { cls: 'w-50', desc: '限制寬度，避免過度撐開版面。' }], jsLogic: '可透過 <code>change</code> 事件得知使用者目前選擇了哪個值。', note: '如果選項很少且重要，Radio 可能比下拉選單更直覺。', code: '<select class="form-select">\n  <option>初階課程</option>\n  <option>進階課程</option>\n</select>' },
            card: { label: 'card 卡片', short: '整理成區塊化內容', title: 'card 卡片元件', badge: '版面容器', concept: '卡片適合整理一組獨立資訊，例如商品、課程、文章摘要或個人檔案。', analogy: '像展示櫃中的一張資料卡，內容集中、可快速掃讀。', anatomy: [{ part: '<code>.card</code>', effect: '建立外層容器與預設邊框。' }, { part: '<code>.card-body</code>', effect: '主要內容區，通常放標題與文字。' }], styles: [{ cls: 'shadow-sm', desc: '讓卡片微微浮起來。' }, { cls: 'border-0', desc: '移除預設邊框，視覺更乾淨。' }], jsLogic: '可搭配點擊事件做展開、收藏或跳轉。', note: '卡片內資訊要有層次，避免每一塊都長得一樣重。', code: '<div class="card shadow-sm border-0" style="max-width: 20rem;">\n  <div class="card-body">\n    <h5 class="card-title">HTML 入門</h5>\n    <p class="card-text">學會標籤、結構與表單基礎。</p>\n  </div>\n</div>' },
            badge: { label: 'badge 徽章', short: '標示狀態與分類', title: 'badge 徽章元件', badge: '狀態提示', concept: '徽章適合標示新功能、分類標籤、數量或狀態，能快速吸引目光。', analogy: '像文件上的小貼紙，讓你一眼分辨重要資訊。', anatomy: [{ part: '<code>.badge</code>', effect: '建立小型膠囊狀標示。' }, { part: '<code>bg-info</code>', effect: '決定徽章背景色。' }], styles: [{ cls: 'rounded-pill', desc: '更接近 App 常見的標籤外觀。' }, { cls: 'bg-danger', desc: '適合警示或未讀數量。' }], jsLogic: '可用 JS 動態更新數字，例如購物車商品數量。', note: '不要只靠顏色傳達資訊，文字也要清楚。', code: '<span class="badge bg-info text-dark rounded-pill">新手必看</span>' },
            img: { label: 'img 圖片', short: '呈現視覺內容與示意圖', title: 'img 圖片標籤', badge: '媒體內容', concept: '圖片用來補充資訊、建立情緒與強化版面，但也需要顧及載入速度與替代文字。', analogy: '像簡報中的插圖，幫助觀眾更快抓到重點。', anatomy: [{ part: '<code>src</code>', effect: '指定圖片來源。' }, { part: '<code>alt</code>', effect: '圖片無法顯示或使用閱讀器時的替代說明。' }], styles: [{ cls: 'img-fluid', desc: '讓圖片隨容器縮放，避免爆版。' }, { cls: 'rounded', desc: '加上圓角，畫面較柔和。' }], jsLogic: '可透過 JS 更換圖片來源，做輪播或主圖切換。', note: 'alt 內容要描述圖片用途，而不是重複寫「圖片」。', code: '<img src="https://picsum.photos/600/300" class="img-fluid rounded" alt="課堂示意圖">' }
        };

        const detailArea = document.getElementById('detail-content');
        const previewArea = document.getElementById('preview-area');
        const codeEditor = document.getElementById('code-editor');
        const tagList = document.getElementById('tag-list');

        function renderTagList() {
            tagList.innerHTML = Object.entries(tagsData).map(([key, item]) => `
                <button type="button" class="tag-item" data-tag="${key}">
                    <span class="tag-key">${key}</span>
                    <span class="tag-label">${item.label}</span>
                    <span class="tag-note">${item.short}</span>
                </button>
            `).join('');
        }

        function setActiveTag(tagKey) {
            tagList.querySelectorAll('.tag-item').forEach((item) => {
                item.classList.toggle('active', item.dataset.tag === tagKey);
            });
        }

        function renderDetail(item) {
            detailArea.innerHTML = `
                <div>
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3 flex-wrap">
                        <div>
                            <h2 class="h3 mb-2">${item.title}</h2>
                            <p class="mb-0 text-muted">${item.concept}</p>
                        </div>
                        <span class="pill">${item.badge}</span>
                    </div>
                    <div class="detail-block mb-3">
                        <h3 class="h6">生活化理解</h3>
                        <p class="mb-0">${item.analogy}</p>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-12">
                            <div class="detail-block">
                                <h3 class="h6">核心語法拆解</h3>
                                <div class="table-responsive">
                                    <table class="table align-middle mb-0">
                                        <thead><tr><th>語法</th><th>作用</th></tr></thead>
                                        <tbody>${item.anatomy.map((part) => `<tr><td>${part.part}</td><td>${part.effect}</td></tr>`).join('')}</tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block">
                                <h3 class="h6">常見樣式</h3>
                                <ul class="info-list">${item.styles.map((style) => `<li><strong>${style.cls}</strong>：${style.desc}</li>`).join('')}</ul>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block">
                                <h3 class="h6">JS 互動提醒</h3>
                                <p class="mb-0">${item.jsLogic}</p>
                            </div>
                        </div>
                    </div>
                    <div class="detail-block">
                        <h3 class="h6">實作提醒</h3>
                        <p class="mb-0">${item.note}</p>
                    </div>
                </div>
            `;
        }

        function showDetail(tagKey) {
            const item = tagsData[tagKey];
            if (!item) return;
            renderDetail(item);
            codeEditor.value = item.code;
            previewArea.innerHTML = item.code;
            setActiveTag(tagKey);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTagList();
            tagList.addEventListener('click', (event) => {
                const target = event.target.closest('.tag-item');
                if (!target) return;
                showDetail(target.dataset.tag);
            });
            codeEditor.addEventListener('input', () => {
                previewArea.innerHTML = codeEditor.value;
            });
            showDetail('h1');
        });
    </script>
</body>

</html>
