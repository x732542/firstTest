<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 常用標籤教學工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="indexhtml.css">
</head>

<body>
    <div class="page-shell">
        <section class="hero">
            <h1 class="h2 mb-0">HTML 常用標籤教學工具</h1>
            <p>以原本教學頁為基底，擴充成依用途分組的常用標籤整理。左邊依分類找標籤，中間看語意與重點，右邊直接修改範例並即時預覽。</p>
        </section>

        <div class="container-fluid px-0">
            <div class="row g-4">
                <div class="col-lg-3">
                    <aside class="panel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">標籤索引</h2>
                            <span id="tag-count" class="pill"></span>
                        </div>
                        <div class="filter-box mb-3">
                            <span class="filter-icon">🔍</span>
                            <input id="tag-search" type="search" placeholder="搜尋標籤，例如 button、table、form">
                        </div>
                        <div id="tag-list" class="sidebar-scroll"></div>
                    </aside>
                </div>

                <div class="col-lg-5">
                    <main class="panel h-100">
                        <div id="detail-content" class="detail-empty">
                            <div>
                                <h2 class="h4">請從左側選一個標籤</h2>
                                <p class="mb-0">這裡會顯示語意、用途、基本語法與實作提醒。</p>
                            </div>
                        </div>
                    </main>
                </div>

                <div class="col-lg-4">
                    <div class="d-grid gap-4 h-100">
                        <section class="panel">
                            <h2 class="h5 mb-3">效果展示</h2>
                            <div id="preview-area" class="preview-area"></div>
                        </section>

                        <section class="panel d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h2 class="h5 mb-0">程式碼範例</h2>
                                <span class="text-muted small">可直接編輯</span>
                            </div>
                            <textarea id="code-editor" class="form-control editor flex-grow-1" spellcheck="false"></textarea>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="indexhtml.js"></script>
</body>

</html>
