<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端新手導覽手冊 - 5分鐘快速複習</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        :root {
            --html-color: #e34c26;
            --css-color: #264de4;
            --js-color: #f7df1e;
        }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; }
        
        /* 圖片按鈕樣式 */
        .lang-card {
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 3px solid transparent;
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }
        .lang-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .lang-card.active { border-color: #764ba2; background: #f0edff; }
        .lang-img { height: 120px; object-fit: contain; padding: 20px; }
        
        pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 8px; position: relative; }
        .code-label { position: absolute; top: 0; right: 10px; font-size: 0.8rem; color: #888; }
        #live-preview { min-height: 150px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ddd; border-radius: 10px; transition: all 0.5s; }
    </style>
</head>
<body>

<!-- 標題區 -->
<header class="hero-section text-center mb-5">
    <div class="container">
        <h1 class="display-4 fw-bold">前端語言：從零到一的抽象具象化</h1>
        <p class="lead">專為新人設計的 5 分鐘複習工具：看圖說故事，動手玩邏輯</p>
    </div>
</header>

<main class="container">
    <div class="row g-4">
        <!-- 左側：圖片按鈕區 (三大語言選單) -->
        <div class="col-md-4">
            <div class="d-flex flex-column gap-3">
                <div class="lang-card text-center active" onclick="updateContent('html', this)">
                    <img src="https://flaticon.com" alt="HTML" class="lang-img">
                    <div class="p-2 fw-bold">HTML - 結構 (Structure)</div>
                </div>
                <div class="lang-card text-center" onclick="updateContent('css', this)">
                    <img src="https://flaticon.com" alt="CSS" class="lang-img">
                    <div class="p-2 fw-bold">CSS - 樣式 (Style)</div>
                </div>
                <div class="lang-card text-center" onclick="updateContent('js', this)">
                    <img src="https://flaticon.com" alt="JS" class="lang-img">
                    <div class="p-2 fw-bold">JavaScript - 行為 (Action)</div>
                </div>
            </div>
        </div>

        <!-- 右側：動態內容展示區 -->
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 id="title" class="card-title mb-3">認識 HTML</h2>
                    <p id="description" class="text-muted mb-4">HTML 是網頁的骨架，它定義了「這裡有個標題」或「那裡有個按鈕」。</p>
                    
                    <h5 class="fw-bold"><i class="bi bi-code-slash"></i> 實作範例碼</h5>
                    <pre><span class="code-label">CODE</span><code id="code-display">&lt;button class="btn btn-primary"&gt;我是結構&lt;/button&gt;</code></pre>

                    <h5 class="fw-bold mt-4">即時檢測效果</h5>
                    <div id="live-preview" class="bg-white">
                        <button class="btn btn-primary" id="demo-element">我是標籤產生的按鈕</button>
                    </div>

                    <div id="interactive-zone" class="mt-3">
                        <!-- JS 互動時會動態塞入控制項 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 引入 Bootstrap 5 JS Bundle -->
<script src="https://jsdelivr.net"></script>

<script>
    const data = {
        html: {
            title: "HTML - 標籤物件 (Tags & Elements)",
            desc: "所有的 HTML 都是「物件」。例如 &lt;button&gt; 標籤在瀏覽器眼中就是一個 HTMLButtonElement 物件。",
            code: '<button id="btn">我是結構</button>',
            preview: '<button class="btn btn-dark">我是標籤產生的按鈕</button>'
        },
        css: {
            title: "CSS - 屬性特徵 (Properties)",
            desc: "CSS 負責修改物件的「特徵」。比如 backgroundColor 是顏色，borderRadius 是圓角程度。",
            code: 'element.style.borderRadius = "20px";\nelement.style.transform = "rotate(5deg)";',
            preview: '<div id="box" style="width:100px; height:100px; background: #264de4; color:white; display:flex; align-items:center; justify-content:center; transition:0.3s;">方塊</div>',
            controls: '<button class="btn btn-outline-primary btn-sm me-2" onclick="applyCSS()">點我改變圓角</button>'
        },
        js: {
            title: "JS - 物件方法 (Methods & Events)",
            desc: "JavaScript 給予物件「生命」。addEventListener 讓網頁能聽懂你的指令並執行對應的方法。",
            code: 'btn.addEventListener("click", () => {\n  alert("這就是互動方法！");\n});',
            preview: '<button class="btn btn-warning fw-bold" id="js-btn">點我執行 JS 方法</button>',
            controls: '<p class="text-info small mt-2">↑ 點擊上方按鈕測試監聽事件</p>'
        }
    };

    function updateContent(type, element) {
        // 更新按鈕選中狀態
        document.querySelectorAll('.lang-card').forEach(card => card.classList.remove('active'));
        element.classList.add('active');

        // 更新內容
        const item = data[type];
        document.getElementById('title').innerText = item.title;
        document.getElementById('description').innerHTML = item.desc;
        document.getElementById('code-display').innerText = item.code;
        document.getElementById('live-preview').innerHTML = item.preview;
        document.getElementById('interactive-zone').innerHTML = item.controls || '';

        // JS 特別邏輯：綁定事件
        if(type === 'js') {
            document.getElementById('js-btn').addEventListener('click', () => {
                alert('✨ 恭喜！你成功觸發了一個 JavaScript 方法！');
            });
        }
    }

    function applyCSS() {
        const box = document.getElementById('box');
        box.style.borderRadius = box.style.borderRadius === '50%' ? '0%' : '50%';
        box.style.transform = 'scale(1.1)';
        setTimeout(() => box.style.transform = 'scale(1)', 200);
    }
</script>

</body>
</html>
