<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前端新手導覽手冊</title>
    <!-- <link href="https://jsdelivr.net" rel="stylesheet"> 很慢-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0"
      crossorigin="anonymous"
    />
    <style>
      header {
        padding: 20px;
        font-size: 15px;
        border: black solid 5px;
        border-radius: 10px;
        text-align: center;
        background-color: orange;
      }
      #textC {
        font-size: 30px;
        border: black solid 5px;
      }
      /* HTML 主題：橘色網格 (結構) */
      .bg-html-theme {
        background-color: #fff5f2;
        background-image: radial-gradient(#e34c2622 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* CSS 主題：藍色漸層 (美學) */
      .bg-css-theme {
        background-color: #f0f4ff;
        background: linear-gradient(135deg, #f0f4ff 0%, #d9e2ff 100%);
      }

      /* JS 主題：黃色光芒 (邏輯) */
      .bg-js-theme {
        background-color: #fffdf0;
        box-shadow: inset 0 0 100px rgba(247, 223, 30, 0.1);
      }

      /* 讓文字切換更平滑 */
      #textC {
        transition: all 0.3s ease;
        min-height: 1.5em; /* 防止文字跳動 */
      }
      body {
        transition: background-color 0.5s ease;
        min-height: 100vh;
        position: relative;
        z-index: 0;
      }

      /* 建立一個全螢幕的光譜背景層 */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0; /* 預設透明 */
        transition: opacity 5s ease; /* 0.5秒漸變 */
        pointer-events: none;
      }

      /* CSS 光譜樣式 (依照可見光譜色序：紅橙黃綠藍靛紫) */
      .bg-css-spectrum::before {
        opacity: 1; /* 觸發時變清晰 */
        background: linear-gradient(
          to right,
          rgba(255, 0, 0, 0.1),
          rgba(255, 165, 0, 0.1),
          rgba(255, 255, 0, 0.1),
          rgba(0, 128, 0, 0.1),
          rgba(0, 0, 255, 0.1),
          rgba(75, 0, 130, 0.1),
          rgba(238, 130, 238, 0.1)
        );
      }

      /* 為了讓光譜清晰，給予一個淡淡的底色 */
      .bg-css-theme {
        background-color: #f0f4ff;
      }
    </style>
  </head>
  <body class="container">
    <header>
      <div>
        <h1>前端語言：從零到一的抽象具象化</h1>
      </div>
    </header>
    <main>
      <div class="row text-center">
        <div class="col-4">
          <img id="HTMLimg" src="./img/html.png" alt="HTML" />
        </div>
        <div class="col-4">
          <img id="CSSimg" src="./img/CSS.png" alt="CSS" />
        </div>
        <div class="col-4">
          <img id="JSimg" src="./img/JS.jpg" alt="JS" />
        </div>
      </div>
      <div>
        <p id="textC">1</p>
      </div>
    </main>

    <!-- JS最後讀取 -->
    <script>
      // 1. 取得 DOM 元素
      const body = document.body;
      const textC = document.getElementById("textC");
      const elements = {
        html: document.getElementById("HTMLimg"),
        css: document.getElementById("CSSimg"),
        js: document.getElementById("JSimg"), // 注意：你 HTML 裡的 id 是 JSimg
      };

      // 2. 定義內容資料庫
      const info = {
        html: {
          text: "HTML：網頁的「骨架」，負責定義內容與標籤結構。",
          color: "#E34C26",
          bgClass: "bg-html-theme",
        },
        css: {
          text: "CSS：網頁的「外衣」，如同光譜般豐富，定義了色彩與美學。",
          color: "#264DE4",
          bgClass: "bg-css-theme",
          spectrumClass: "bg-css-spectrum", // 新增一個控制光譜的類別
        },
        js: {
          text: "JavaScript：網頁的「大腦」，負責互動邏輯與動態行為。",
          color: "#F7DF1E",
          bgClass: "bg-js-theme",
        },
      };

      // 3. 綁定事件函式
      function setupHover(lang) {
        const target = elements[lang];
        if (!target) return;

        target.addEventListener("mouseenter", () => {
          body.classList.add(info[lang].bgClass);
          if (info[lang].spectrumClass) {
            body.classList.add(info[lang].spectrumClass);
          }
          textC.innerText = info[lang].text;
          textC.style.color = info[lang].color;
          target.style.transform = "scale(1.1)";
        });

        target.addEventListener("mouseleave", () => {
          body.classList.remove(info[lang].bgClass);
          if (info[lang].spectrumClass) {
            body.classList.remove(info[lang].spectrumClass);
          }
          textC.innerText = "請點擊上方圖片開始複習";
          textC.style.color = "black";
          target.style.transform = "scale(1)";
        });
      }

      // 4. 初始化所有圖片的監聽
      setupHover("html");
      setupHover("css");
      setupHover("js");
    </script>
    <script src="script.js"></script>
  </body>
</html>
