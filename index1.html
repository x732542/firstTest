<!doctype html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>前端新手導覽手冊</title>
  <!-- 引入 Bootstrap Icons -->
  <link rel="icon" href="./icon.jpg" type="image/x-icon">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body class="container">
  <header>
    <h1>前端語言：從零到一的抽象具象化</h1>
  </header>
  <!-- 煙火畫布：覆蓋全螢幕且不擋住點擊 -->
  <canvas id="starfieldCanvas" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -2;
      "></canvas>

  <main class="mt-5">
    <div class="row text-center gy-4 justify-content-center">
      <!-- 注意這裡加上了 img-container-html -->
      <div class="col-4 img-container img-container-html" id="container-html">
        <img id="HTMLimg" src="./img/html5.png" alt="HTML" class="img-fluid" />
      </div>
      <div class="col-4 img-container" id="container-css">
        <img id="CSSimg" src="./img/css3.png" alt="CSS" class="img-fluid" />
      </div>
      <div class="col-4 img-container" id="container-js">
        <img id="JSimg" src="./img/js.png" alt="JS" class="img-fluid" />
      </div>
    </div>

    <div class="row mt-5 justify-content-center">
      <div class="col-10 col-md-9">
        <div id="textC">請將滑鼠移至圖片上開始學習</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>

  <!-- JS 練習網自訂確認框 -->
  <div id="js-confirm-modal">
    <div class="js-modal-box">
      <p>要前往 <strong>JavaScript.info</strong> 練習網嗎？</p>
      <div class="js-modal-btns">
        <button id="js-modal-yes">是，前往！</button>
        <button id="js-modal-no">不了，留下來</button>
      </div>
    </div>
  </div>
</body>

</html>
